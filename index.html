<style>
  body { margin:0; overflow:hidden; }

    width:100vw;
    height:100vh;
  }

  .marker {
    transform: translate(-50%, -50%);

  }
  .dropdown {
  position: relative;
  display: inline-block;
}

.dropdownMenu {
  display: none;
  position: absolute;
  top: 60px;
  left: 0;
  background: white;
  border-radius: 10px;
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
  overflow: hidden;
  min-width: 120px;
  z-index: 1000;
}

.dropdownMenu button {
  width: 100%;
  border: none;
  background: white;
  padding: 8px 10px;
  cursor: pointer;
}

.dropdownMenu button:hover {
  background: #f0f0f0;
}
#variableControl{

  top:10px;
  left:50%;
  transform:translateX(-50%);

}

}

}

#variableMenu button:hover{

.varButton{

// ================= UTILS =================
function toNum(v) {
  const n = Number(v);
  return isNaN(n) ? null : n;
}

function getMarkerSize() {
  return 26;

// ================= RENDER =================
// ================= RENDER =================
function renderCircle(el, value, color, size = 36) {

  el.innerHTML = "";

  // WRAPPER VERTICALE
  const wrapper = document.createElement("div");
  wrapper.style.display = "flex";
  wrapper.style.flexDirection = "column";
  wrapper.style.alignItems = "center";

  // ===== CERCHIO =====
  const circle = document.createElement("div");

  circle.style.width = size + "px";
  circle.style.height = size + "px";
  circle.style.borderRadius = "50%";
  circle.style.backgroundColor = color;
  circle.style.border = "2px solid white";

  circle.style.display = "flex";
  circle.style.alignItems = "center";
  circle.style.justifyContent = "center";

  circle.style.fontFamily = `"Inter","SF Pro Display","Segoe UI",sans-serif`;
  circle.style.fontWeight = "600";
  circle.style.fontSize = "11px";
  circle.style.color = "white";
  circle.style.overflow = "hidden";

  circle.textContent =
    value != null ? value.toFixed(1) : "";

  // ===== PUNTA (TRIANGOLO) =====
  const pointer = document.createElement("div");

  pointer.style.width = "0";
  pointer.style.height = "0";
  pointer.style.borderLeft = "8px solid transparent";
  pointer.style.borderRight = "8px solid transparent";
  pointer.style.borderTop = "6px solid white";
  pointer.style.marginTop = "-2px";

  // ===== COMPOSIZIONE =====
  wrapper.appendChild(circle);
  wrapper.appendChild(pointer);
  el.appendChild(wrapper);
}
let activePopup = null;
function showMarkerPopup(id) {

  const d = latestData[id];
  if (!d) return;

  if (activePopup) {
    activePopup.remove();
    activePopup = null;
  }

  const variable = currentVariable;
  const get = (base) => d[base] ?? null;

  const fmt = (v) => (v == null ? "-" : Number(v).toFixed(1));

  let primary = null;
  let max = null;
  let min = null;
  let label = "";
  let unit = "";

  const isRain = (variable === "rainDaily" || variable === "rainRate");

  // ======================
  // NOME STAZIONE (FIX QUI)
  // ======================
  const stationName = d.N || d.nome || id;

  // ======================
  // VARIABILI METEO
  // ======================
  if (variable === "temp") {
    primary = get("temp");
    max = get("tempHigh");
    min = get("tempLow");
    label = "Temperatura:";
    unit = "°";
  }

  if (variable === "hum") {
    primary = get("hum");
    max = get("humHigh");
    min = get("humLow");
    label = "Umidità:";
    unit = "%";
  }

  if (variable === "dewp") {
    primary = get("dewp");
    max = get("dewpHigh");
    min = get("dewpLow");
    label = "Dew Point:";
    unit = "°";
  }

  if (variable === "heat") {
    primary = get("heat");
    max = get("heatHigh");
    min = get("heatLow");
    label = "Heat Index:";
    unit = "°";
  }

  // ======================
  // PIOGGIA
  // ======================
  if (variable === "rainDaily") {
    primary = get("rainDaily");
    label = "Pioggia giornaliera:";
    unit = "mm";
  }

  if (variable === "rainRate") {
    primary = get("rainRate");
    label = "Intensità pioggia:";
    unit = "mm/h";
  }

  const el = document.createElement("div");

  el.innerHTML = `
    <div style="font-family: 'Inter', sans-serif; text-align:center;">

      <!-- STAZIONE -->
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">
        Stazione: ${stationName}
      </div>

      <!-- LABEL -->
      <div style="font-size:12px;opacity:0.7;margin-bottom:2px;">
        ${label}
      </div>

      <!-- VALORE PRINCIPALE -->
      <div style="font-size:28px;font-weight:800;margin-bottom:6px;">
        ${fmt(primary)}${unit}
      </div>

      <!-- SECONDARIO -->
      ${
        isRain
          ? `
            <div style="font-size:12px;opacity:0.85;">
              ${variable === "rainDaily"
                ? `Rate: <b style="color:#000;">${fmt(get("rainRate"))} mm/h</b>`
                : `Giornaliera: <b style="color:#000;">${fmt(get("rainDaily"))} mm</b>`
              }
            </div>
          `
          : `
            <div style="font-size:12px;display:flex;justify-content:center;gap:6px;">

              <span style="color:#ef4444;font-weight:700;">
                ${fmt(max)}${unit}
              </span>

              <span style="opacity:0.6;">-</span>

              <span style="color:#3b82f6;font-weight:700;">
                ${fmt(min)}${unit}
              </span>

            </div>
          `
      }

    </div>
  `;

  activePopup = new maplibregl.Popup({
    closeButton: false,
    closeOnClick: true,
    offset: 18,
    className: "clean-popup"
  })
    .setLngLat([d.lon, d.lat])
    .setDOMContent(el)
    .addTo(map);

  // utile per eventuale update futuro
  activePopup._stationId = id;
}
function createMarker(id, lat, lon) {

  if (markers[id]) {
    markers[id].remove();
    delete markers[id];
  }

  const el = document.createElement("div");
  el.className = "marker";

  renderCircle(el, null, "#808080", getMarkerSize());

const marker = new maplibregl.Marker({
  element: el,
  anchor: "bottom"
})
.setLngLat([lon, lat])
.addTo(map);

// 👉 CLICK EVENT
el.addEventListener("click", (e) => {
  e.stopPropagation();
  showMarkerPopup(id);
});

  markers[id] = marker;
}

function updateMarker(id) {

  const d = latestData[id];
  const m = markers[id];

  if (!d || !m) return;

  const el = m.getElement();

  const variable = currentVariable;
  const mode = modes[variable];

// ================= FETCH =================
async function fetchPws(id) {

  const meta = stations[id];
  if (!meta) return;

  const stationApi = meta.api;
  const stationName = meta.nome || id;
  try {

    // ================= CURRENT =================
    const urlCurrent =
      `https://api.weather.com/v2/pws/observations/current` +
      `?apiKey=${apiKey}&stationId=${stationApi}` +
      `&numericPrecision=decimal&format=json&units=m`;

    const resCurrent = await fetch(urlCurrent);
    const dataCurrent = await resCurrent.json();

    const obs = dataCurrent?.observations?.[0];
    if (!obs) return;

    const temp = obs.metric?.temp ?? null;
    const dewp = obs.metric?.dewpt ?? null;
    const heat = obs.metric?.heatIndex ?? null;
    const hum = obs?.humidity ?? null;

    const rainDaily = obs.metric?.precipTotal ?? null;
    const rainRate = obs.metric?.precipRate ?? null;

    const lat = obs?.lat ?? null;
    const lon = obs?.lon ?? null;

    const wind = obs.metric?.windSpeed ?? null;
    const windGust = obs.metric?.windGust ?? null;
    const windDir = obs?.winddir ?? null;

    // ================= DAILY =================
    const urlDaily =
      `https://api.weather.com/v2/pws/dailysummary/1day` +
      `?apiKey=${apiKey}&stationId=${stationApi}` +
      `&numericPrecision=decimal&format=json&units=m`;

    const resDaily = await fetch(urlDaily);
    const dataDaily = await resDaily.json();

    const summary = dataDaily?.summaries?.[0]?.metric ?? {};

    const tempHigh = summary?.tempHigh ?? null;
    const tempLow = summary?.tempLow ?? null;

    const dewpHigh = summary?.dewptHigh ?? null;
    const dewpLow = summary?.dewptLow ?? null;

    const heatHigh = summary?.heatindexHigh ?? null;
    const heatLow = summary?.heatindexLow ?? null;

    const humHigh = dataDaily?.summaries?.[0]?.humidityHigh ?? null;
    const humLow = dataDaily?.summaries?.[0]?.humidityLow ?? null;

    const windGustHigh = summary?.windgustHigh ?? null;

    // ================= SAVE =================
    latestData[id] = {
      N: stationName,
      temp,
      tempHigh,
      tempLow,
      dewp,
      dewpHigh,
      dewpLow,
      heat,
      heatHigh,
      heatLow,
      hum,
      humHigh,
      humLow,
      rainDaily,
      rainRate,
      wind,
      windGust,
      windGustHigh,
      windDir,
      lat,
      lon
    };

    if (!markers[id]) {
      createMarker(id, lat, lon);
    }

    updateMarker(id);

  } catch (e) {
    console.error(e);
  }
}
