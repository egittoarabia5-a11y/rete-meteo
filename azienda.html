-post-type="page" id="skip-content" tabindex="-1"><div class="elementor-element elementor-element-c688659 e-con-full e-flex e-con e-parent e-lazyloaded" data-id="c688659" data-element_type="container" data-e-type="container" data-settings="{&quot;background_background&quot;:&quot;classic&quot;}"><div class="elementor-element elementor-element-72a9e14 e-flex e-con-boxed e-con e-child" data-id="72a9e14" data-element_type="container" data-e-type="container"><div class="e-con-inner"><div class="elementor-element elementor-element-5900c7d elementor-widget elementor-widget-shortcode" data-id="5900c7d" data-element_type="widget" data-e-type="widget" data-widget_type="shortcode.default"><div class="elementor-widget-container"><div class="elementor-shortcode"><nav aria-label="breadcrumbs" class="rank-math-breadcrumb"><p><a href="https://www.italpreziosi.it">Italpreziosi</a><span class="separator"> &gt; </span><span class="last">Azienda</span></p></nav></div></div></div><div class="elementor-element elementor-element-ffc187a elementor-widget elementor-widget-heading" data-id="ffc187a" data-element_type="widget" data-e-type="widget" data-widget_type="heading.default"><div class="elementor-widget-container"><h1 class="elementor-heading-title elementor-size-default">Italpreziosi: <span class="sf">leader in oro</span>, affinazione e metalli preziosi</h1></div></div><div class="elementor-element elementor-element-0aa1c55 elementor-widget__width-inherit elementor-widget elementor-widget-text-editor" data-id="0aa1c55" data-element_type="widget" data-e-type="widget" data-widget_type="text-editor.default"><div class="elementor-widget-container"><p>Fondata nel 1984, Italpreziosi S.p.A. è uno dei principali operatori per l’affinazione, il trading di metalli preziosi, oltre alla produzione e al commercio di lingotti di oro e argento da investimento in Italia e nei più importanti mercati internazionali. Con sede ad <strong>Arezzo, nel cuore del distretto orafo più importante d’Europa</strong>, l’azienda è oggi un punto di riferimento per l’intero comparto a livello nazionale e internazionale. Italpreziosi è riconosciuta a livello internazionale per l’elevato standard qualitativo, confermato anche dalla certificazione <strong>LBMA Good Delivery</strong>, simbolo di eccellenza nel settore.</p><p>Grazie a tecnologie di ultima generazione e impianti a impatto ambientale prossimo allo zero, Italpreziosi occupa una posizione centrale nella catena del valore dei metalli preziosi, offrendo soluzioni integrate per miniere, banche, istituti finanziari, produttori di gioielli, aziende industriali e clienti retail oltre a <a href="https://shop.italpreziosi.it/" target="_blank" rel="noopener nofollow">investitori privati</a></p></div></div></div></div></div><div class="elementor-element elementor-element-3e7611b e-con-full e-flex e-con e-parent e-lazyloaded" data-id="3e7611b" data-element_type="container" data-e-type="container" id="attivita" data-settings="{&quot;background_background&quot;:&quot;classic&quot;}"><div class="elementor-element elementor-element-53e5d1f e-flex e-con-boxed e-con e-child" data-id="53e5d1f" data-element_type="container" data-e-type="container"><div class="e-con-inner"><div class="elementor-element elementor-element-7649723 elementor-widget elementor-widget-heading" data-id="7649723" data-element_type="widget" data-e-type="widget" data-widget_type="heading.default"><div class="elementor-widget-container"><h2 class="elementor-heading-title elementor-size-default">Attività</h2></div></div><div class="elementor-element elementor-element-3b236e3 elementor-widget elementor-widget-heading" data-id="3b236e3" data-element_type="widget" data-e-type="widget" data-widget_type="heading.default"><div class="elementor-widget-container"><h3 class="elementor-heading-title elementor-size-default">L’attività della società comprende</h3></div></div></div></div><div class="elementor-element elementor-element-6090f69 e-con-full card-carousel company-pg e-
