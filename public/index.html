  }
  .dropdown {
  position: relative;
  display: inline-block;
}

.dropdownMenu {
  display: none;
  position: absolute;
  top: 60px;
  left: 0;
  background: white;
  border-radius: 10px;
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
  overflow: hidden;
  min-width: 120px;

}

.dropdownMenu button {
  width: 100%;
  border: none;
  background: white;
  padding: 8px 10px;
  cursor: pointer;
}

.dropdownMenu button:hover {
  background: #f0f0f0;
}
#variableControl{

  top:10px;
  left:50%;

}

  height:100%;

}

.varButton img{

.clean-popup .maplibregl-popup-tip {

}

#refreshRegionButton:hover{

}
#regionMenu button{

  border:none;
  background:white;
  padding:10px;

}
#pitchToggle {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 1000;

  background: white;
  color: #111;

  padding: 8px 14px;
  border-radius: 10px;

  font-size: 13px;
  font-family: "Inter", sans-serif;

  cursor: pointer;

  box-shadow: 0 2px 6px rgba(0,0,0,.15);
  user-select: none;

  transition: all 0.2s ease;
}
#pitchToggle:hover {
  background: #f5f5f5;
}

#pitchToggle:active {
  transform: scale(0.96);
}
#regionMenu button:hover{

// ================= COLORI =================
function getColor(variable, value) {
  if (value === null) return "#808080";

  if (variable === "hum") {
    if (value < 20) return "#b44141";
    else if (value < 30) return "#ff6262";
    else if (value < 40) return "#ff9d56";
    else if (value < 50) return "#f1d800";
    else if (value < 60) return "#65d050";
    else if (value < 70) return "#6ca561";
    else if (value < 80) return "#4dc8ff";
    else if (value < 90) return "#4da9ff";
    return "#4d54ff";
  }

  if (variable === "rainDaily" || variable === "rainRate") {
    if (value === 0) return "#808080";
    else if (value < 2) return "#f9ae6c";
    else if (value < 5) return "#f9966c";
    else if (value < 10) return "#6ca561";
    else if (value < 20) return "#65d050";
    else if (value < 30) return "#4dc8ff";
    else if (value < 50) return "#4da9ff";
    return "#2c278e";
  }

  // Temperatura / Dewpoint / Heat
  if (value < -20) return "#9d8cac";
  if (value < -15) return "#f54dff";
  if (value < -10) return "#c65bff";
  if (value < -5) return "#4d54ff";
  if (value <= 0) return "#4da9ff";
  if (value < 5) return "#4dc8ff";
  if (value < 11) return "#5e8b56";
  if (value < 15) return "#65d050";
  if (value < 20) return "#f2c72f";
  if (value < 25) return "#ff9d56";
  if (value < 30) return "#ff6262";
  if (value < 35) return "#b44141";
  if (value < 38) return "#d963c3";
  if (value >= 38) return "#9d8cac";
  if (value >= 40) return "#453e4b";
  if (value >= 45) return "#222222";
  return "#ff5c5c";
}

// ================= GET VALUE =================
function getValueAndColor(st) {
  const mode = modes[currentVariable];
  let value = null;

  const get = (base) => mode === "current" ? st[base] : 
                        mode === "max" ? st[base + "High"] : 
                        st[base + "Low"];

  if (currentVariable === "temp") value = get("temp");
  else if (currentVariable === "dewp") value = get("dewp");
  else if (currentVariable === "heat") value = get("heat");
  else if (currentVariable === "hum") value = get("hum");
  else if (currentVariable === "rainDaily") value = st.rainDaily;
  else if (currentVariable === "rainRate") value = st.rainRate;

  return {
    value,
    color: getColor(currentVariable, value),
    valueStr: value !== null ? value.toFixed(1) : ""
  };
}

// ================= UPDATE LAYER =================
function updateLayer() {
  geojson.features = Object.values(allStations).map(st => {
    const { color, valueStr } = getValueAndColor(st);
    return {
      type: "Feature",
      geometry: { type: "Point", coordinates: [st.lon, st.lat] },
properties: {
  id: st.id,
  name: st.N,
  source: st.source,
  valueStr: shownValue,
  color
}
    };
  });

  const source = map.getSource('weather-stations');
  if (source) source.setData(geojson);
}

function showPopup(feature) {

  if (!feature?.properties) return;

  const props = feature.properties;

  const name = props.name;
  const source = props.source;

  if (activePopup) activePopup.remove();

  const fmt = v => v == null ? "—" : Number(v).toFixed(1);

  const isRain = currentVariable === "rainDaily" || currentVariable === "rainRate";

  const value = props.valueStr ?? "—";

  const html = `
    <div style="font-family:Inter,sans-serif;text-align:center;">
      <div style="font-weight:700;font-size:15px;margin-bottom:6px;">
        ${name}<br>Fonte: ${source}
      </div>

      <div style="font-size:13px;opacity:0.75;margin-bottom:6px;">
        ${currentVariable === "temp" ? "Temperatura" :
          currentVariable === "dewp" ? "Dew Point" :
          currentVariable === "heat" ? "Heat Index" :
          currentVariable === "hum" ? "Umidità" :
          isRain ? "Pioggia" : ""}
      </div>

      <div style="font-size:32px;font-weight:800;">
        ${value}${isRain ? " mm" : "°"}
      </div>
    </div>
  `;

  activePopup = new maplibregl.Popup({
    closeButton: true,
    closeOnClick: true,
    offset: 20,
    className: "clean-popup"
  })
    .setLngLat(feature.geometry.coordinates)
    .setHTML(html)
    .addTo(map);
}

      ...(data2?.stations || [])
    ];

    if (!stations.length) return;

    stations.forEach((st) => {

      const id = st.N;

      const lat = Number(st.LAT);
      const lon = Number(st.LON);

      if (!lat || !lon) return;

      allStations[id] = {

        source: "LIMET",

        N: st.N ?? null,
        // ===== TEMPERATURE =====
        temp: st.T ?? null,
        tempHigh: st.TH ?? null,
        tempLow: st.TL ?? null,

        // ===== HUMIDITY =====
        hum: st.H ?? null,
        humHigh: st.HH ?? null,
        humLow: st.HL ?? null,

        // ===== WIND =====
        wind: st.V ?? null,
        windGust: st.VR ?? null,

        // ===== RAIN =====
        rainDaily: st.R ?? null,
        rainRate: st.RR ?? null,

        // ===== DEWPOINT =====
        dewp: st.D ?? null,
        dewpHigh: st.DH ?? null,
        dewpLow: st.DL ?? null,

        // ===== PRESSURE =====
        pressure: st.P ?? null,

        // ===== EXTRA =====
        heat: st.HI ?? null,
        heatHigh: null,
        heatLow: st.TL ?? null,
        time: st.TIME ?? null,

        lat,
        lon
      };

      updateLayer(id);
    });

  } catch (err) {
    console.error("Errore fetch LIMET:", err);
  }
};

function setRegion(region){

  currentRegion = region;

  clearAllIntervals();

  if(region === "liguria") startLiguria();
  if(region === "piemonte") startPiemonte();
  if(region === "lombardia") startLombardia();
  if(region === "globale") startWorld();

  document.getElementById("regionButton").innerText =
    region.charAt(0).toUpperCase() + region.slice(1);
}
document.getElementById("regionButton").onclick = () => {
  const m = document.getElementById("regionMenu");
  m.style.display = m.style.display === "block" ? "none" : "block";
};

document.querySelectorAll("#regionMenu button").forEach(btn=>{
  btn.onclick = () => {
    setRegion(btn.dataset.region);
    document.getElementById("regionMenu").style.display = "none";
  };
});
document
  .getElementById("refreshRegionButton")
  .addEventListener("click", () => {

    const btn = document.getElementById("refreshRegionButton");

    btn.style.transform = "rotate(360deg)";

    setTimeout(() => {
      btn.style.transform = "";
    }, 500);

    switch(currentRegion){

      case "liguria":
        startLiguria();
        break;

      case "piemonte":
        startPiemonte();
        break;

      case "lombardia":
        startLombardia();
        break;

      case "globale":
        startWorld();
        break;
    }

  });
setRegion("lombardia");

  function loadLiguriaData(){

  Object.keys(stations).forEach(id =>

  );

  fetchComuneGenova();
  fetchLimet();
  fetchPWSGenova();

}
function startLiguria(){

  clearAllIntervals();
  clearPreviousRegionStations();

  regionStationIds = new Set(Object.keys(stations));

  loadLiguriaData();

  // PWS interval
  intervals.push(setInterval(() => {
    Object.keys(stations).forEach(id =>
      fetchPws(id, stations)
    );
  }, 300000));

  // altri dataset interval (IMPORTANTISSIMO)
  intervals.push(setInterval(fetchOMIRL, 300000));
  intervals.push(setInterval(fetchIgnorete, 300000));
  intervals.push(setInterval(fetchComuneGenova, 300000));
  intervals.push(setInterval(fetchLimet, 300000));
  intervals.push(setInterval(fetchPWSGenova, 300000));
  intervals.push(setInterval(fetchWF, 300000));
  intervals.push(setInterval(fetchNetatmoGenova, 300000));
}
function startWorld(){

  clearAllIntervals();
  clearPreviousRegionStations();


  fetchPWSWorld();
  // ===== INTERVALS =====
  intervals.push(setInterval(fetchPWSWorld, 600000));
}

function startPiemonte(){

  clearAllIntervals();
  clearPreviousRegionStations();

  regionStationIds = new Set([
    ...Object.keys(stationsPiemonte)
  ]);

  // ===== FETCH INITIAL =====
  Object.keys(stationsPiemonte).forEach(id =>
    fetchPws(id, stationsPiemonte)
  );

  fetchDMA();
  fetch3R();

  // ===== INTERVALS =====
  intervals.push(setInterval(() => {
    Object.keys(stationsPiemonte).forEach(id =>

    );
  }, 300000));

  intervals.push(setInterval(fetchDMA, 300000));
  intervals.push(setInterval(fetch3R, 300000));
}

  clearAllIntervals();

  // se hai stationsLombardia in futuro

    ]);

    Object.keys(stationsLombardia).forEach(id =>

    );

    intervals.push(setInterval(() => {
