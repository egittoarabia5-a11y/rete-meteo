<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seleziona la Mappa</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    background:#e9e9e9;
}

.container{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    gap:30px;
    padding:30px;
}

.button{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
    border-radius:30px;
    text-decoration:none;
    color:#333;
    font-size:3rem;
    font-weight:bold;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
    transition:.25s ease;
}

.button:hover{
    transform:scale(1.02);
    box-shadow:0 16px 35px rgba(0,0,0,0.18);
}

.button:active{
    transform:scale(0.99);
}
</style>

</head>
<body>

<div class="container">
    <a href="VecchiaMappa.html" class="button">Mappa Vecchia</a>
    <a href="NuovaMappa.html" class="button">Mappa Nuova</a>
</div>

</body>
</html>
