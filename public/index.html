<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>3D Terrain Map</title>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
  body { margin:0; overflow:hidden; }
  #map { width:100vw; height:100vh; }
</style>
</head>

<body>
<div id="map"></div>

<script>
const map = new maplibregl.Map({
  container: "map",
  style: "https://api.maptiler.com/maps/basic-v2/style.json?key=yoJV05O0V6lTp5gne3Fr",
  center: [8.95, 44.4],
  zoom: 11,
  pitch: 60,
  bearing: 0
});

map.on("load", () => {

  // ================= TERRAIN =================
  map.addSource("terrain", {
    type: "raster-dem",
    url: "https://api.maptiler.com/tiles/terrain-rgb/tiles.json?key=yoJV05O0V6lTp5gne3Fr",
    tileSize: 512
  });

  map.setTerrain({
    source: "terrain",
    exaggeration: 1.4
  });

  // ================= HILLSHADE (FONDAMENTALE) =================
  map.addSource("hillshade", {
    type: "raster-dem",
    url: "https://api.maptiler.com/tiles/terrain-rgb/tiles.json?key=yoJV05O0V6lTp5gne3Fr",
    tileSize: 512
  });

  map.addLayer({
    id: "hillshade",
    type: "hillshade",
    source: "hillshade",
    paint: {
      "hillshade-exaggeration": 0.6
    }
  });
map.setLight({
  anchor: "map",
  intensity: 1.4,
  position: [0, 90, 120]
});
});
</script>
</body>
</html>
