*{

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}


/* SFONDO FOTO */
#pixel-info{

    position:fixed;

    transform:translate(10px,10px);

    background:rgba(0,0,0,.75);

    color:#fff;

    padding:4px 6px;

    border-radius:5px;

    font:12px 'Open Sans',sans-serif;

    pointer-events:none;

    z-index:99999;
}
#map{
    position:relative;
    width:100%;
    height:100vh;
    background:url("provinciaGenova.png") center center / cover no-repeat;
}


/* BARRA SUPERIORE */

.topbar{

    position:absolute;

    top:20px;
    left:50%;

    transform:translateX(-50%);

    display:flex;

    gap:15px;

    z-index:1000;

}



.title-box{

    background:rgba(220,220,220,0.9);

    padding:12px 25px;

    border-radius:10px;

    font-size:26px;

    font-weight:bold;

    color:#333;

    box-shadow:0 3px 10px rgba(0,0,0,.3);

}



#menu{

    background:rgba(220,220,220,0.9);

    padding:12px 18px;

    border-radius:10px;

    display:flex;

    align-items:center;

    gap:10px;

    box-shadow:0 3px 10px rgba(0,0,0,.3);

}

.weather-popup {

    position:absolute;

    min-width:160px;

    padding:12px 15px;

    border-radius:10px;

    color:white;

    font-weight:bold;

    text-align:center;

    font-size:14px;

    box-shadow:0 3px 10px rgba(0,0,0,0.4);

    z-index:1000;

    transform:translate(-50%, -120%);

}

select{

    padding:6px;

    border-radius:6px;

}


#station-info{

    position:absolute;

    top:20px;
    left:-690px;

    width:260px;

    border-radius:10px;

    overflow:hidden;

    box-shadow:0 3px 10px rgba(0,0,0,.35);

    z-index:3000;

    font-family:'Open Sans',sans-serif;

}

#station-info-color{

    position:absolute;

    inset:0;

    opacity:.30;

}

#station-info-content{

    position:relative;

    background:#ececec;

    margin:4px;

    border-radius:8px;

    padding:12px;

    color:#222;

}
/* MARKER */

.weather-marker {

    position:absolute;
    opacity: 0.92;

    height:28px;

    background:#F0B800;

    border-radius:50%;

    display:flex;

    font-weight: 600;

    color:white;

    border:2px solid white;

    box-shadow:0 2px 8px rgba(0,0,0,0.45);

    z-index:500;

    transform:translate(-50%,-50%);
}

const mapDiv = document.getElementById("map");
const pixelInfo = document.getElementById("pixel-info");

mapDiv.addEventListener("click", function(e){

    const rect = mapDiv.getBoundingClientRect();

    const x = Math.round(e.clientX - rect.left);
    const y = Math.round(e.clientY - rect.top);


    console.log(`X: ${x}px, Y: ${y}px`);


    pixelInfo.innerHTML = `
        X: ${x}px<br>
        Y: ${y}px
    `;


    pixelInfo.style.left = x + "px";
    pixelInfo.style.top = y + "px";


    pixelInfo.style.display="block";

});
function createMarker(id){

    const marker = document.createElement("div");

    marker.id = "marker-" + id;

    marker.className = "weather-marker";


    document.getElementById("map").appendChild(marker);


    marker.onclick = () => openPopup(id);


    return marker;

}
function createPopup(id){

    const popup = document.createElement("div");

    popup.id = "popup-" + id;

    popup.className = "weather-popup";


    document.getElementById("map").appendChild(popup);


    return popup;

}

        default:

// ----- Colori Umidità -----
function getColorHum(hum) {

  if (hum >= 90) return "#0114F0"; 
  if (hum >= 80) return "#0060F0"; 
  if (hum >= 70) return "#00BDEF"; 
  if (hum >= 60) return "#21C2C5"; 
  if (hum >= 50) return "#21C573"; 
  if (hum >= 40) return "#3AA300"; 
  if (hum >= 30) return "#F0B800"; 
  if (hum >= 20) return "#F0CB00";
  if (hum >= 10) return "#F07D00";

  return "#F01E00"; 
}



// ----- Colori Pioggia -----
function getColorRain(rain) {

  if (rain >= 150) return "#9d8cac"; 
  if (rain >= 100) return "#d963c3";
  if (rain >= 50) return "#4d54ff";
  if (rain >= 30) return "#4da9ff"; 
  if (rain >= 20) return "#4dc8ff";
  if (rain >= 10) return "#65d050";
  if (rain >= 5) return "#6ca561";
  if (rain > 2) return "#f9966c";
  if (rain >= 0.2) return "#f9ae6c";

  return "#808080"; 
}



// ----- Colori Temperatura -----
function getColorTemp(temp) {

  if (temp < -20) return "#9d8cac";
  if (temp < -15) return "#f54dff";
  if (temp < -10) return "#c65bff";
  if (temp < -5) return "#4d54ff";
  if (temp <= 0) return "#4b96dd";
  if (temp < 5) return "#4dc8ff";
  if (temp < 11) return "#5e8b56";
  if (temp < 15) return "#3AA300";
  if (temp < 20) return "#F0B800";
  if (temp < 25) return "#ff9d56";
  if (temp < 30) return "#ff6262";
  if (temp < 35) return "#b44141";
  if (temp < 38) return "#d963c3";
  if (temp < 40) return "#9d8cac";
  if (temp >= 40) return "#453e4b";

  return "#ff5c5c";
}

function openPopup(id){


    let popup = document.getElementById("popup-"+id);


    if(!popup){

        popup = createPopup(id);

    }



    const pos = markerPosition[id];

    const d = latestData[id];


    if(!d) return;



    const marker = document.getElementById("marker-"+id);


    const color = marker.style.background;



    popup.style.left = pos.x + "px";

    popup.style.top = pos.y + "px";


    popup.style.background = color;



    popup.innerHTML = `

        <div style="font-size:16px;">
            ${stations[id]?.name ?? stationsOMIRL[id]?.name ?? id}
        </div>

        <div style="font-size:22px;margin-top:5px;">
            ${d.temp != null ? d.temp.toFixed(1) : "--"}
        </div>

    `;


    popup.style.display="block";

}
async function fetchIgnorete() {

    try {

        const res = await fetch(
            "https://api-stazioni-meteo.eggittof.workers.dev/ignorete.json"
        );

        const data = await res.json();

        const ignoreteStations = data.stations;

        Object.keys(stationsIgnorete).forEach(id => {

            const station = ignoreteStations.find(
                s => s.id === id
            );

            if (!station) {

                console.warn(
                    "Stazione Ignorete non trovata:",
                    id
                );

                return;

            }

            latestData[id] = {

                source: "IGNORETE",

                name: stationsIgnorete[id].name,

                // temperatura
                temp: station.T,
                tempHigh: station.TH,
                tempLow: station.TL,

                // dewpoint
                dewp: station.D,
                dewpHigh: station.DH,
                dewpLow: station.DL,

                // heat index
                heat: station.HI,
                heatHigh: station.HIH,
                heatLow: station.HIL,

                // umidità

async function fetchPws(id) {

    try {

        const station = stations[id];


        // DATI ATTUALI
        const urlCurrent =
        `https://api.weather.com/v2/pws/observations/current?apiKey=${apiKey}&stationId=${station.api}&numericPrecision=decimal&format=json&units=m`;


        const resCurrent = await fetch(urlCurrent);
        const dataCurrent = await resCurrent.json();


        const obs = dataCurrent.observations[0];


        const temp = obs.metric.temp;
        const dewp = obs.metric.dewpt;
        const heat = obs.metric.heatIndex;

        const hum = obs.humidity;


        const rainDaily = obs.metric.precipTotal;
        const rainRate = obs.metric.precipRate;


        const wind = obs.metric.windSpeed;
        const windGust = obs.metric.windGust;

        const windDir = obs.winddir;


        const altitude = obs.metric.elev;



        // DATI GIORNALIERI
        const urlDaily =
        `https://api.weather.com/v2/pws/dailysummary/1day?apiKey=${apiKey}&stationId=${station.api}&numericPrecision=decimal&format=json&units=m`;


        const resDaily = await fetch(urlDaily);
        const dataDaily = await resDaily.json();


        const summary =
        dataDaily.summaries?.[0] ?? null;


        const metric =
        summary?.metric ?? null;



        const tempHigh = metric?.tempHigh ?? null;
        const tempLow = metric?.tempLow ?? null;


        const dewpHigh = metric?.dewptHigh ?? null;
        const dewpLow = metric?.dewptLow ?? null;


        const heatHigh = metric?.heatindexHigh ?? null;
        const heatLow = metric?.heatindexLow ?? null;


        const humHigh =
        summary?.humidityHigh ?? null;

        const humLow =
        summary?.humidityLow ?? null;


        const windGustHigh =
        metric?.windgustHigh ?? null;



        latestData[id] = {


            source:"Wunderground",


            // valori attuali
            temp,
            dewp,
            heat,
            hum,

            rainDaily,
            rainRate,

            wind,
            windGust,
            windDir,


            // estremi
            tempHigh,
            tempLow,

            dewpHigh,
            dewpLow,

            heatHigh,
            heatLow,

            humHigh,
            humLow,

            windGustHigh,

        };


        updateMarker(id);



    } catch(err){

        console.error(
            "Errore fetch PWS:",
            id,
            err
        );

    }

}
function markerValue(id){

    const d = latestData[id];

    if(!d)
        return null;


    let value;


    switch(tempSelect.value){


        case "current":
            value = d.temp;
            break;


        case "max":
            value = d.tempHigh;
            break;


        case "min":
            value = d.tempLow;
            break;


        case "dewpt":
            value = d.dewp;
            break;


        case "dewpMax":
            value = d.dewpHigh;
            break;


        case "dewpMin":
            value = d.dewpLow;
            break;


        case "Heat":
            value = d.heat;
            break;


        case "HeatMax":
            value = d.heatHigh;
            break;


        case "HeatMin":
            value = d.heatLow;
            break;


        case "hum":
            value = d.hum;
            break;


        case "humMax":
            value = d.humHigh;
            break;


        case "humMin":
            value = d.humLow;
            break;


        case "rainDay":
            value = d.rainDaily;
            break;


        case "rainRate":
            value = d.rainRate;
            break;


        case "wind":
            value = d.wind;
            break;


        case "windGust":
            value = d.windGust;
            break;


        case "windGustMax":
            value = d.windGustHigh;
            break;


        default:
            value = d.temp;

    }


    // se manca il dato
    if(value === null || value === undefined || isNaN(value))
        return null;


    return Number(value).toFixed(1);

}

    const pos = markerPosition[id];
